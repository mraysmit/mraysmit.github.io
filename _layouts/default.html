<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2328;
        --muted: #57606a;
        --link: #0969da;
        --card: #f6f8fa;
        --border: #d0d7de;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --fg: #e6edf3;
          --muted: #9da7b3;
          --link: #58a6ff;
          --card: #161b22;
          --border: #30363d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 3rem 1.25rem 4rem;
      }

      h1,
      h2 {
        line-height: 1.2;
      }

      h1 {
        margin-bottom: 0.5rem;
        font-size: 2.4rem;
      }

      p.lead {
        font-size: 1.1rem;
        color: var(--muted);
        margin-top: 0;
      }

      section {
        margin-top: 2.5rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.1rem;
        margin-top: 1rem;
      }

      ul.posts {
        list-style: none;
        padding: 0;
        margin: 1rem 0 0;
      }

      ul.posts li {
        padding: 0.9rem 0;
        border-top: 1px solid var(--border);
      }

      ul.posts li:first-child {
        border-top: 0;
        padding-top: 0;
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover,
      a:focus {
        text-decoration: underline;
      }

      .post-title {
        font-weight: 600;
        font-size: 1.05rem;
      }

      .post-meta {
        color: var(--muted);
        font-size: 0.95rem;
        margin-top: 0.15rem;
      }

      .post-body h2,
      .post-body h3 {
        margin-top: 2rem;
      }

      .post-body ul,
      .post-body ol {
        padding-left: 1.5rem;
      }

      .post-body code {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.1em 0.4em;
        font-size: 0.9em;
      }

      .back-link {
        display: inline-block;
        margin-top: 2.5rem;
        font-size: 0.95rem;
      }

      footer {
        margin-top: 3rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
