---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.description %} &mdash; {{ page.description }}{% endif %}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <a class="back-link" href="/">← Back to home</a>
</article>
